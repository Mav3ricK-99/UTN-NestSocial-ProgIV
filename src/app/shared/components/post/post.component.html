<div class="w-180 bg-white rounded-3xl shadow-lg p-5 border border-gray-100">

    <div>
        <div class="flex flex-row gap-3">
            <img [src]="post().profileImage" alt="profile" class="w-12 h-12 rounded-full object-cover">

            <div>
                <div class="flex justify-between">

                    <div class="flex gap-3">

                        <div>

                            <div class="font-semibold cursor-pointer hover:underline">
                                {{ post().authorName }}
                            </div>

                            <div class="text-sm text-gray-500">
                                @{{ post().username }}
                            </div>

                            <div class="text-xs text-gray-400">
                                {{ post().createdAt }}
                            </div>

                        </div>

                    </div>

                </div>

                <div class="min-w-xl mt-4 text-gray-800 whitespace-pre-line" [class.typing-cursor]="showPrompter">
                      {{ displayedText() }}
                </div>

                @if(post().image) {

                <img [src]="post().image" alt="post image" class="mt-4 rounded-2xl w-full max-h-[450px] object-cover" />

                }
            </div>

            <button class="place-self-start cursor-pointer text-gray-500 hover:text-black">
                <lucide-icon [img]="Ellipsis" class="size-5"></lucide-icon>
            </button>


        </div>
        <div class="w-full flex justify-around mt-5 pt-4 border-t border-gray-100">

            <button
                class="flex items-center gap-2 cursor-pointer text-blue-300 transition duration-300 ease-in-out commentButton">
                <lucide-icon [img]="MessageCircle" id="comment-icon"
                    class="size-4 text-blue-300 fill-current"></lucide-icon>
                {{ post().comments }}
            </button>

            <button [class.text-red-500]="post().liked" [class.text-red-300]="!post().liked"
                class="flex items-center gap-2 cursor-pointer transition duration-300 ease-in-out likeButton">
                <lucide-icon [img]="Heart" [class.text-red-500]="post().liked" [class.text-red-300]="!post().liked"
                    class="size-4 fill-current"></lucide-icon>
                {{ post().likes }}
            </button>

            <button
                class="flex items-center gap-2 cursor-pointer text-green-300 transition duration-300 ease-in-out repostButton">
                <lucide-icon [img]="Repeat" id="repost-icon" class="size-4 text-green-300 fill-current"></lucide-icon>
                {{ post().reposts }}
            </button>

        </div>
    </div>

</div>
