<div [class]="inAside() ? 'asidePost' : 'w-180'" class="bg-olive-100 rounded-3xl shadow-lg p-5">
    <div>
        <p-toast />
        <div class="flex flex-row gap-3">
            <img [src]="post().op?.getAvatarPathUrl()" alt="profile" class="w-12 h-12 rounded-full object-cover">
            <div>
                <div class="flex justify-between">
                    <div class="flex gap-3">
                        <div>
                            <div class="font-semibold cursor-pointer hover:underline">
                                {{ post().op?.getUserFullName() }}
                            </div>
                            <div class="text-sm text-gray-500">
                                @{{ post().op?.getUserName() }}
                            </div>
                            <div class="text-xs text-gray-400">
                                {{ post().getCreatedAt() }}
                            </div>
                        </div>
                    </div>
                </div>
                <div [class.min-w-xl]="!inAside()" [class.whitespace-pre-line]="!isDummyPost()!"
                    class="mt-4 text-gray-800" [class.typing-cursor]="showPrompter && isDummyPost()!">
                    @if(isDummyPost()!) {
                    {{ displayedText() }}
                    } @else {
                    <div [innerHTML]="post().getContent()"></div>
                    }
                </div>
                @if(post().getPostImage() != undefined && post().getPostImage()?.length != 0) {

                @if(!imageLoaded()) {
                <div class="block w-[720px] h-[450px] mt-4 bg-gray-200 animate-pulse rounded-2xl"></div>
                } @else {
                <img [src]="post().getPostImage()" alt="post image" [class.opacity-0]="!imageLoaded()"
                    [class.opacity-100]="imageLoaded()" (load)="imageLoaded.set(true)"
                    class="mt-4 rounded-2xl w-full max-h-[450px] object-cover transition-opacity duration-500" />
                }
                }
            </div>

            <button class="place-self-start cursor-pointer text-gray-500 hover:text-black">
                <lucide-icon [img]="Ellipsis" class="size-5"></lucide-icon>
            </button>
        </div>
        <div class="w-full flex justify-around mt-5 pt-4 border-t border-gray-100">

            <button
                class="flex items-center gap-2 cursor-pointer text-blue-300 transition duration-300 ease-in-out commentButton">
                <lucide-icon [img]="MessageCircle" id="comment-icon"
                    class="size-4 text-blue-300 fill-current"></lucide-icon>
                {{ post().getCommentsCount() }}
            </button>

            <button [class.text-red-500]="post().getLiked()" [class.text-red-300]="!post().getLiked()"
                [disabled]="likeBtnDisabled"
                class="flex items-center gap-2 cursor-pointer transition duration-300 ease-in-out likeButton">
                <lucide-icon [img]="Heart" (click)="giveLike()" [class.text-red-500]="post().getLiked()"
                    [class.text-red-300]="!post().getLiked()" class="size-4 fill-current"></lucide-icon>
                {{ post().getLikesCount() }}
            </button>

            <button
                class="flex items-center gap-2 cursor-pointer text-green-300 transition duration-300 ease-in-out repostButton">
                <lucide-icon [img]="Repeat" id="repost-icon" class="size-4 text-green-300 fill-current"></lucide-icon>
                {{ post().getSharesCount() }}
            </button>

        </div>
    </div>

</div>
