<div class="flex bg-olive-50/90">

    <app-sidebar />

    <div class="mx-auto flex gap-6 px-4 py-6">

        <div class="sticky top-4 mb-4">

            <p-button icon="pi pi-arrow-left" text rounded (click)="goBack()" />

        </div>

        <!-- POST -->
        <main class="flex-1 max-w-3xl">

            @if(post()) {
            <app-post [post]="post()!" />
            }

        </main>

        <!-- ASIDE -->

        <aside class="w-80 shrink-0 hidden xl:block">

            <p-card styleClass="rounded-3xl">

                <h3 class="font-bold text-slate-700 mb-4">
                    Relacionados
                </h3>

                <!-- @for(post of relatedPosts(); track post.getId()) {

                <app-small-post-card [post]="post" />

                } -->

            </p-card>

        </aside>

    </div>

</div>
